<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精選課程選購</title>
    <style>
        /* 🎨 CSS 主題色彩變數：與主頁完美連通 */
        :root {
            --bg-main: #050505;
            --bg-gradient: linear-gradient(135deg, #020202 0%, #0d0d0d 100%);
            --nav-bg: rgba(15, 15, 15, 0.85);
            --card-bg: rgba(20, 20, 20, 0.85);
            --card-border: rgba(0, 255, 102, 0.15); 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary-light: #00ff66; 
            --accent: #00f0ff; 
            --shadow: 0 10px 35px rgba(0, 255, 102, 0.05);
            --logo-color: #ffffff;
        }

        [data-theme="light"] {
            --bg-main: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary-light: #2563eb; 
            --accent: #d97706;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --logo-color: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        html, body, button, a, input, textarea { cursor: none !important; }
        
        body {
            background: var(--bg-main); background-image: var(--bg-gradient); color: var(--text-main);
            min-height: 100vh; padding-top: 100px;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-image 0.8s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s ease;
            overflow-x: hidden; position: relative;
        }

        /* ⚡ 發光漸層雷電游標 */
        #custom-cursor { position: fixed; width: 32px; height: 32px; pointer-events: none; z-index: 10000; top: 0; left: 0; transform: translate(-10%, -10%); display: block; }
        #custom-cursor::before { content: ''; display: block; width: 100%; height: 100%; background: linear-gradient(135deg, #ffe600 0%, #ff6600 50%, #ff0000 100%); clip-path: polygon(55% 0%, 10% 55%, 50% 55%, 40% 100%, 90% 40%, 50% 40%); animation: pulse-glow 1.5s infinite alternate; }
        @keyframes pulse-glow { 0% { filter: drop-shadow(0px 0px 4px #ff6600); } 100% { filter: drop-shadow(0px 0px 10px #ff3300); } }

        /* 💥 點擊實體擴散圈 */
        .click-ripple { position: fixed; width: 10px; height: 10px; background: transparent; border: 3px solid var(--primary-light); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); animation: ripple-out 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; box-shadow: 0 0 8px var(--primary-light); }
        @keyframes ripple-out { 0% { width: 10px; height: 10px; opacity: 1; border-width: 3px; } 100% { width: 55px; height: 55px; opacity: 0; border-width: 1px; } }
        #fx-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9998; }

        /* 固定導覽列 */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: var(--nav-bg); border-bottom: 1px solid var(--card-border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px; z-index: 1000; transition: background 0.8s;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        nav .logo { font-size: 1.3rem; font-weight: bold; color: var(--logo-color) !important; transition: color 0.6s; }
        .nav-right { display: flex; align-items: center; gap: 30px; }
        nav ul { display: flex; list-style: none; gap: 25px; }
        nav ul li a { color: var(--text-main); text-decoration: none; font-size: 1rem; font-weight: 500; }
        nav ul li a:hover { color: var(--primary-light); }
        .controls-group { display: flex; align-items: center; gap: 15px; }

        /* 🎵 黑膠唱片面板組件 */
        .music-player-container { display: flex; align-items: center; gap: 12px; background: var(--card-bg); padding: 6px 16px; border-radius: 30px; border: 1px solid var(--card-border); }
        .disc-btn { width: 36px; height: 36px; background: #111; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .disc-btn::after { content: ''; position: absolute; width: 8px; height: 8px; background: var(--primary-light); border-radius: 50%; }
        .disc-btn.playing { animation: spin-disc 4s linear infinite; box-shadow: 0 0 10px var(--primary-light); border-color: var(--primary-light); }
        @keyframes spin-disc { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 📊 進度條面板 */
        .progress-box { display: flex; flex-direction: column; width: 110px; font-size: 0.75rem; color: var(--text-main); }
        .time-info { display: flex; justify-content: space-between; margin-bottom: 2px; font-family: monospace; }
        .slider-bar { width: 100%; -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
        [data-theme="light"] .slider-bar { background: rgba(0,0,0,0.1); }
        .slider-bar::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 8px; height: 8px; background: var(--primary-light); border-radius: 50%; cursor: pointer; box-shadow: 0 0 5px var(--primary-light); }

        .icon-btn { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }
        .course-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; margin-top: 40px; }
        .course-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; text-align: left; box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.3s, border-color 0.3s; }
        .course-card:hover { transform: translateY(-5px); }

        .video-wrapper { width: 100%; position: relative; padding-top: 56.25%; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .image-wrapper { width: 100%; height: 0; padding-top: 56.25%; position: relative; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--card-border); background: #0a0a0a; transition: box-shadow 0.3s; }
        .image-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: top !important; }
        .course-card:hover .image-wrapper { box-shadow: 0 0 15px var(--primary-light); }

        .price-tag { font-size: 1.5rem; color: var(--accent); font-weight: bold; margin: 15px 0; }
        .pay-btn { background: var(--primary-light); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 1rem; width: 100%; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        [data-theme="dark"] .pay-btn { color: #000; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="fx-canvas"></canvas>

    <!-- 音訊元件 -->
    <audio id="bg-music" loop src="music.mp3"></audio>
    <audio id="click-sound" src="pop.mp3" preload="auto"></audio>

    <nav>
        <div class="logo">⚡ 軍一補救教室</div>
        <div class="nav-right">
            <ul>
                <li><a href="index.html">🏠 主頁</a></li>
                <li><a href="courses.html">🛒 購買課程</a></li>
                <li><a href="contact.html">✉️ 聯絡我們</a></li>
            </ul>
            <div class="controls-group">
                <!-- 黑膠唱片控制面板 -->
                <div class="music-player-container">
                    <button class="disc-btn" id="play-pause-btn"></button>
                    <div class="progress-box">
                        <div class="time-info">
                            <span id="current-time">00:00</span>
                            <span id="total-time">00:00</span>
                        </div>
                        <input type="range" class="slider-bar" id="music-progress" value="0" max="100">
                    </div>
                </div>
                <button class="icon-btn" id="theme-toggle">🌓</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="course-container">
            <!-- 課程卡片 1 (影片預覽) -->
            <div class="course-card">
                <div>
                    <div class="video-wrapper">
                        <video src="preview1.mp4" muted loop autoplay playsinline></video>
                    </div>
                    <h3>核心精修補救課程</h3>
                    <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">快速掌握關鍵考點，突破學習瓶頸。</p>
                </div>
                <div>
                    <div class="price-tag">NT$ 67</div>
                    <button class="pay-btn">立即選購</button>
                </div>
            </div>

            <!-- 課程卡片 2 (圖片預覽) -->
            <div class="course-card">
                <div>
                    <div class="image-wrapper">
                        <img src="preview2.jpg" alt="課程封面">
                    </div>
                    <h3>進階實戰衝刺班</h3>
                    <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">全方位模擬演練，高效提升答題速度。</p>
                </div>
                <div>
                    <div class="price-tag">NT$ 67</div>
                    <button class="pay-btn">立即選購</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
