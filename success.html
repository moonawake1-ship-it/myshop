<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>付款成功｜軍一補救教室</title>
    <style>
        body {
            background: #050505;
            color: #f3f4f6;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .card {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(0, 255, 102, 0.25);
            border-radius: 20px;
            padding: 40px;
            max-width: 520px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.12);
        }

        h1 {
            color: #00ff66;
        }

        .info {
            margin-top: 20px;
            color: #9ca3af;
            line-height: 1.8;
        }

        .debug {
            margin-top: 18px;
            color: #666;
            font-size: 0.8rem;
            word-break: break-all;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background: #00ff66;
            color: #000;
            text-decoration: none;
            border-radius: 999px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>✅ 付款成功</h1>
        <p>感謝您的購買，系統正在確認付款資料。</p>

        <div class="info" id="payment-info">付款資料確認中...</div>
        <div class="debug" id="debug-info"></div>

        <a href="courses.html">返回課程頁</a>
    </div>

    <script>
        async function checkPayment() {
            const infoEl = document.getElementById('payment-info');
            const debugEl = document.getElementById('debug-info');

            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id');

            if (!sessionId) {
                infoEl.innerText = '找不到付款編號，但您已回到成功頁。';
                debugEl.innerText = '目前網址沒有 session_id。';
                return;
            }

            try {
                const apiUrl = `https://junyi-myshop.onrender.com/api/check-payment?session_id=${sessionId}`;

                const res = await fetch(apiUrl);
                const data = await res.json();

                debugEl.innerText = `付款查詢狀態：${res.status}`;

                if (data.paid) {
                    infoEl.innerHTML =
                        `課程名稱：${data.courseName}<br>
                         付款金額：NT$${data.amount}<br>
                         付款信箱：${data.email || '未提供'}<br>
                         付款狀態：已付款<br>
                         Discord 通知：已送出`;
                } else {
                    infoEl.innerHTML =
                        `付款尚未完成或尚未確認。<br>
                         Stripe 狀態：${data.status || '未知'}<br>
                         ${data.error || ''}`;
                }

            } catch (error) {
                console.error("付款確認失敗 =", error);

                infoEl.innerText = '付款確認失敗，請稍後再試。';
                debugEl.innerText = error.message;
            }
        }

        checkPayment();
    </script>
</body>
</html>
